name: PR Verify

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.13

      - name: Validate packages token
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          if [ -z "$GH_PACKAGES_TOKEN" ]; then
            echo "Missing repository secret GH_PACKAGES_TOKEN (PAT with read:packages)."
            exit 1
          fi

      - name: Configure npm auth for GitHub Packages
        run: |
          printf '@rchapkailo:registry=https://npm.pkg.github.com/\n//npm.pkg.github.com/:_authToken=${GH_PACKAGES_TOKEN}\nalways-auth=true\n' > "${GITHUB_WORKSPACE}/.npmrc"

      - name: Install dependencies
        run: bun install
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test
