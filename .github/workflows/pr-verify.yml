name: PR Verify

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://npm.pkg.github.com
          scope: '@rchapkailo'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.13

      - name: Validate packages token
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          if [ -z "$GH_PACKAGES_TOKEN" ]; then
            echo "Missing repository secret GH_PACKAGES_TOKEN (PAT with read:packages)."
            exit 1
          fi

      - name: Configure npm auth for GitHub Packages
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          cat <<EOF > "$HOME/.npmrc"
          @rchapkailo:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${GH_PACKAGES_TOKEN}
          always-auth=true
          EOF

      - name: Install dependencies
        run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test