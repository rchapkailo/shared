name: Promote Stable

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: release branch containing the approved release candidate, for example release/1.5
        required: true
        type: string
      release_commit_sha:
        description: exact commit SHA on the release branch that passed parent e2e
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  promote-stable:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_branch }}
          fetch-depth: 0

      - name: Verify release branch exists on origin
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch }}
        run: |
          if ! git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
            echo "Release branch '$RELEASE_BRANCH' does not exist on origin. Run cut-release first."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://npm.pkg.github.com

      - name: Validate approved release commit
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch }}
          RELEASE_COMMIT_SHA: ${{ inputs.release_commit_sha }}
        run: |
          if [[ "$RELEASE_BRANCH" != release/* ]]; then
            echo "release_branch must start with 'release/'"
            exit 1
          fi
          git rev-parse "$RELEASE_COMMIT_SHA^{commit}" >/dev/null 2>&1
          git merge-base --is-ancestor "$RELEASE_COMMIT_SHA" "origin/$RELEASE_BRANCH"
          git checkout -B release-candidate "$RELEASE_COMMIT_SHA"

      - name: Read package name
        id: package
        run: |
          NAME=$(node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); if(!pkg.name){process.exit(2)}; process.stdout.write(pkg.name);")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Install semantic-release tools
        run: npm install --no-save semantic-release @semantic-release/commit-analyzer

      - name: Analyze commits and calculate stable version
        id: stable_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > .releaserc.json <<'EOF'
          {
            "branches": ["release-candidate"],
            "plugins": ["@semantic-release/commit-analyzer"]
          }
          EOF
          SEMANTIC_RELEASE_OUTPUT=$(npx semantic-release --dry-run --no-ci --repository-url "https://github.com/${GITHUB_REPOSITORY}.git" 2>&1 || true)
          printf '%s\n' "$SEMANTIC_RELEASE_OUTPUT"
          STABLE_VERSION=$(printf '%s\n' "$SEMANTIC_RELEASE_OUTPUT" | sed -n 's/.*The next release version is //p' | tail -n 1)
          if [[ -z "$STABLE_VERSION" ]]; then
            echo "semantic-release did not calculate a releasable version for the approved release commit."
            exit 1
          fi
          echo "version=$STABLE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Enforce major/minor-only stable promotion
        env:
          STABLE_VERSION: ${{ steps.stable_version.outputs.version }}
        run: |
          PATCH=$(node -e "const parts=(process.argv[1]||'').split('.').map(Number); if(parts.length!==3||parts.some(Number.isNaN)){process.exit(1)}; process.stdout.write(String(parts[2]));" "$STABLE_VERSION")
          if [[ "$PATCH" != "0" ]]; then
            echo "Promote stable supports MAJOR/MINOR only. Computed version '$STABLE_VERSION' is a patch release. Use hotfix workflow for patch releases."
            exit 1
          fi

      - name: Verify stable version is not already published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          STABLE_VERSION: ${{ steps.stable_version.outputs.version }}
        run: |
          if npm view "${{ steps.package.outputs.name }}@$STABLE_VERSION" version >/dev/null 2>&1; then
            echo "Stable version $STABLE_VERSION already exists for ${{ steps.package.outputs.name }}."
            exit 1
          fi
          echo "Stable version $STABLE_VERSION is available for publishing."

      - name: Publish stable package version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          npm version "${{ steps.stable_version.outputs.version }}" --no-git-tag-version
          npm publish

      - name: Tag approved release commit
        env:
          STABLE_VERSION: ${{ steps.stable_version.outputs.version }}
        run: |
          git tag "v$STABLE_VERSION"
          git push origin "v$STABLE_VERSION"

      - name: Show resulting stable version and dist-tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          npm view "${{ steps.package.outputs.name }}@${{ steps.stable_version.outputs.version }}" version
          npm view "${{ steps.package.outputs.name }}" dist-tags --json
