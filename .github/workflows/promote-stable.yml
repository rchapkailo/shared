name: Promote Stable

on:
  workflow_dispatch:
    inputs:
      parent_green_e2e_commit_sha:
        description: commit SHA of Parent repo with latest green e2e before release day
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  promote-stable:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://npm.pkg.github.com

      - name: Check out parent repo at green e2e commit
        uses: actions/checkout@v6
        with:
          repository: rchapkailo/parent
          ref: ${{ inputs.parent_green_e2e_commit_sha }}
          path: parent-source
          fetch-depth: 1

      - name: Read package name
        id: package
        run: |
          NAME=$(node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); if(!pkg.name){process.exit(2)}; process.stdout.write(pkg.name);")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Resolve canary version from parent commit
        id: parent_canary
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
        run: |
          CANARY_VERSION=$(node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('parent-source/package.json','utf8')); const dep = pkg.dependencies?.[process.env.PACKAGE_NAME] ?? pkg.devDependencies?.[process.env.PACKAGE_NAME] ?? pkg.peerDependencies?.[process.env.PACKAGE_NAME]; if(!dep){process.exit(1)}; process.stdout.write(dep);")
          if [[ -z "$CANARY_VERSION" ]]; then
            echo "Could not resolve dependency version for $PACKAGE_NAME from parent-source/package.json"
            exit 1
          fi
          if [[ "$CANARY_VERSION" != *-canary.* ]]; then
            echo "Resolved parent dependency version for $PACKAGE_NAME must include '-canary.' segment. Got: $CANARY_VERSION"
            exit 1
          fi
          echo "version=$CANARY_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify canary package exists
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            if npm view "${{ steps.package.outputs.name }}@${{ steps.parent_canary.outputs.version }}" version; then
              exit 0
            fi
            if [[ "$attempt" -lt 3 ]]; then
              echo "Retrying canary existence check (attempt $((attempt + 1))/3)..."
              sleep 2
            fi
          done
          echo "Could not verify canary package version after 3 attempts."
          exit 1

      - name: Compute stable version from parent canary
        id: stable_version
        env:
          PARENT_CANARY_VERSION: ${{ steps.parent_canary.outputs.version }}
        run: |
          STABLE_VERSION="${PARENT_CANARY_VERSION%%-canary.*}"
          if [[ ! "$STABLE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid stable base parsed from canary version: $PARENT_CANARY_VERSION"
            exit 1
          fi
          echo "version=$STABLE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify stable version is not already published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          STABLE_VERSION: ${{ steps.stable_version.outputs.version }}
        run: |
          if npm view "${{ steps.package.outputs.name }}@$STABLE_VERSION" version >/dev/null 2>&1; then
            echo "Stable version $STABLE_VERSION already exists for ${{ steps.package.outputs.name }}."
            exit 1
          fi
          echo "Stable version $STABLE_VERSION is available for publishing."

      - name: Publish stable package version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          npm version "${{ steps.stable_version.outputs.version }}" --no-git-tag-version
          npm publish

      - name: Show resulting stable version and dist-tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          npm view "${{ steps.package.outputs.name }}@${{ steps.stable_version.outputs.version }}" version
          npm view "${{ steps.package.outputs.name }}" dist-tags --json

      - name: Compute next development version
        id: next_version
        env:
          STABLE_VERSION: ${{ steps.stable_version.outputs.version }}
        run: |
          BASE_VERSION="$STABLE_VERSION"
          if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid stable version: $STABLE_VERSION"
            exit 1
          fi
          NEXT_VERSION=$(node -e "const [maj,min,pat]=process.argv[1].split('.').map(Number); if([maj,min,pat].some(Number.isNaN)){process.exit(1)}; process.stdout.write([maj,min,pat+1].join('.'));" "$BASE_VERSION")
          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump package.json for next sprint
        run: npm version "${{ steps.next_version.outputs.next }}" --no-git-tag-version

      - name: Commit next development baseline
        env:
          NEXT_VERSION: ${{ steps.next_version.outputs.next }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add package.json
          git commit -m "chore: start next sprint at v${{ steps.next_version.outputs.next }}"

      - name: Open PR for next development baseline
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PR_TOKEN != '' && secrets.GH_PR_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore: start next sprint at v${{ steps.next_version.outputs.next }}"
          branch: chore/next-sprint-v${{ steps.next_version.outputs.next }}
          delete-branch: true
          title: "chore: start next sprint at v${{ steps.next_version.outputs.next }}"
          body: |
            This PR updates package.json to the next development baseline after promoting canary to stable.
          base: main
