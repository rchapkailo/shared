name: Promote Stable

on:
  workflow_dispatch:
    inputs:
      canary_version:
        description: Exact canary version to promote (for example 0.1.0-canary.04-25-2026-18-36-08Z.pr10)
        required: true
        type: string
      parent_green_e2e_commit_sha:
        description: commit SHA of Parent repo with latest green e2e before release day
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  promote-stable:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://npm.pkg.github.com

      - name: Read package name
        id: package
        run: echo "name=$(node -p \"require('./package.json').name\")" >> "$GITHUB_OUTPUT"

      - name: Validate canary input format
        env:
          CANARY_VERSION: ${{ inputs.canary_version }}
        run: |
          if [[ "$CANARY_VERSION" != *-canary.* ]]; then
            echo "Input canary_version must include '-canary.' segment. Got: $CANARY_VERSION"
            exit 1
          fi

      - name: Verify canary package exists
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: npm view "${{ steps.package.outputs.name }}@${{ inputs.canary_version }}" version

      - name: Verify input matches current canary tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          INPUT_CANARY_VERSION: ${{ inputs.canary_version }}
        run: |
          DIST_TAGS_JSON=$(npm view "${{ steps.package.outputs.name }}" dist-tags --json)
          CURRENT_CANARY=$(node -e "const tags=JSON.parse(process.argv[1]);process.stdout.write(tags.canary||'')" "$DIST_TAGS_JSON")
          if [[ -z "$CURRENT_CANARY" ]]; then
            echo "No canary dist-tag found for ${{ steps.package.outputs.name }}"
            exit 1
          fi
          if [[ "$CURRENT_CANARY" != "$INPUT_CANARY_VERSION" ]]; then
            echo "Input canary_version ($INPUT_CANARY_VERSION) does not match current canary tag ($CURRENT_CANARY)."
            exit 1
          fi

      - name: Promote canary to latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: npm dist-tag add "${{ steps.package.outputs.name }}@${{ inputs.canary_version }}" latest

      - name: Show resulting dist-tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: npm view "${{ steps.package.outputs.name }}" dist-tags --json

      - name: Read base version from checked out commit
        id: base_version
        run: |
          git cat-file -e "${{ inputs.parent_green_e2e_commit_sha }}^{commit}"
          BASE_VERSION=$(git show "${{ inputs.parent_green_e2e_commit_sha }}:package.json" | node -e "const pkg=JSON.parse(require('fs').readFileSync(0,'utf8')); process.stdout.write(pkg.version);")
          echo "base=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next development version
        id: next_version
        run: |
          BASE_VERSION="${{ steps.base_version.outputs.base }}"
          NEXT_VERSION=$(node -e "const [maj,min,pat]=process.argv[1].split('.').map(Number); if([maj,min,pat].some(Number.isNaN)){process.exit(1)}; process.stdout.write([maj,min,pat+1].join('.'));" "$BASE_VERSION")
          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump package.json for next sprint
        run: npm version "${{ steps.next_version.outputs.next }}" --no-git-tag-version

      - name: Commit next development baseline
        env:
          NEXT_VERSION: ${{ steps.next_version.outputs.next }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add package.json

      - name: Open PR for next development baseline
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: start next sprint at v${{ steps.next_version.outputs.next }}"
          branch: chore/next-sprint-v${{ steps.next_version.outputs.next }}
          delete-branch: true
          title: "chore: start next sprint at v${{ steps.next_version.outputs.next }}"
          body: |
            This PR updates package.json to the next development baseline after promoting canary to stable.
          base: main
