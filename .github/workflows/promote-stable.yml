name: Promote Stable

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  promote-stable:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository metadata
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://npm.pkg.github.com

      - name: Resolve latest release branch and commit
        id: resolve_release_target
        run: |
          git fetch origin "+refs/heads/release/*:refs/remotes/origin/release/*"

          RELEASE_BRANCH=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin/release | sed 's#^origin/##' | sort -V | tail -n 1)
          if [[ -z "$RELEASE_BRANCH" ]]; then
            echo "No release/* branches found on origin. Run cut-release first."
            exit 1
          fi

          SOURCE_COMMIT_SHA=$(git rev-parse "origin/$RELEASE_BRANCH")
          if [[ -z "$SOURCE_COMMIT_SHA" ]]; then
            echo "Could not resolve HEAD commit for origin/$RELEASE_BRANCH."
            exit 1
          fi

          git rev-parse "$SOURCE_COMMIT_SHA^{commit}" >/dev/null 2>&1
          git checkout -B release-candidate "$SOURCE_COMMIT_SHA"

          echo "release_branch=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "source_commit_sha=$SOURCE_COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Read package name
        id: package
        run: |
          NAME=$(node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); if(!pkg.name){process.exit(2)}; process.stdout.write(pkg.name);")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Analyze commits and calculate stable version
        id: stable_version
        env:
          SOURCE_COMMIT_SHA: ${{ steps.resolve_release_target.outputs.source_commit_sha }}
        run: |
          # semantic-release dry-run verifies remote/branch permissions even in no-publish mode.
          # Use a local bare repo as temporary remote to avoid GitHub token workflow-file push restrictions.
          ANALYSIS_BRANCH="sr-analysis"
          TEMP_GIT_DIR=$(mktemp -d)
          TEMP_REMOTE="$TEMP_GIT_DIR/semantic-release-remote.git"
          cleanup() {
            rm -rf "$TEMP_GIT_DIR"
          }
          trap cleanup EXIT

          git init --bare "$TEMP_REMOTE"
          git push "file://$TEMP_REMOTE" "$SOURCE_COMMIT_SHA":refs/heads/$ANALYSIS_BRANCH
          git --git-dir "$TEMP_REMOTE" symbolic-ref HEAD "refs/heads/$ANALYSIS_BRANCH"
          git checkout -B "$ANALYSIS_BRANCH" "$SOURCE_COMMIT_SHA"

          cat > .releaserc.json <<EOF
          {
            "branches": ["$ANALYSIS_BRANCH"],
            "plugins": ["@semantic-release/commit-analyzer"]
          }
          EOF

          export GITHUB_REF="refs/heads/$ANALYSIS_BRANCH"
          export GITHUB_REF_NAME="$ANALYSIS_BRANCH"
          export GITHUB_HEAD_REF=""
          export GITHUB_BASE_REF=""

          SEMANTIC_RELEASE_OUTPUT=$(npx --yes --package semantic-release --package @semantic-release/commit-analyzer semantic-release --dry-run --no-ci --branches "$ANALYSIS_BRANCH" --repository-url "file://$TEMP_REMOTE" 2>&1 || true)
          printf '%s\n' "$SEMANTIC_RELEASE_OUTPUT"
          STABLE_VERSION=$(printf '%s\n' "$SEMANTIC_RELEASE_OUTPUT" | sed -nE 's/.*[Tt]he next release version is ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' | tail -n 1)
          if [[ -z "$STABLE_VERSION" ]]; then
            echo "semantic-release did not calculate a releasable version for the approved release commit."
            exit 1
          fi
          echo "version=$STABLE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Enforce major/minor-only stable promotion
        env:
          STABLE_VERSION: ${{ steps.stable_version.outputs.version }}
        run: |
          PATCH=$(node -e "const parts=(process.argv[1]||'').split('.').map(Number); if(parts.length!==3||parts.some(Number.isNaN)){process.exit(1)}; process.stdout.write(String(parts[2]));" "$STABLE_VERSION")
          if [[ "$PATCH" != "0" ]]; then
            echo "Promote stable supports MAJOR/MINOR only. Computed version '$STABLE_VERSION' is a patch release. Use hotfix workflow for patch releases."
            exit 1
          fi

      - name: Verify stable version is not already published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          STABLE_VERSION: ${{ steps.stable_version.outputs.version }}
        run: |
          if npm view "${{ steps.package.outputs.name }}@$STABLE_VERSION" version >/dev/null 2>&1; then
            echo "Stable version $STABLE_VERSION already exists for ${{ steps.package.outputs.name }}."
            exit 1
          fi
          echo "Stable version $STABLE_VERSION is available for publishing."

      - name: Publish stable package version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          npm version "${{ steps.stable_version.outputs.version }}" --no-git-tag-version
          npm publish

      - name: Tag approved release commit
        env:
          STABLE_VERSION: ${{ steps.stable_version.outputs.version }}
        run: |
          git tag "v$STABLE_VERSION"
          git push origin "v$STABLE_VERSION"

      - name: Show resulting stable version and dist-tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          npm view "${{ steps.package.outputs.name }}@${{ steps.stable_version.outputs.version }}" version
          npm view "${{ steps.package.outputs.name }}" dist-tags --json
