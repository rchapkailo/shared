name: Cut Release Branch

on:
  workflow_dispatch:
    inputs:
      parent_commit_sha:
        description: commit SHA on parent main used to resolve shared canary
        required: true
        type: string
      parent_repo:
        description: parent repository in owner/name format
        required: false
        default: rchapkailo/parent
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  cut-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Resolve shared commit from parent canary
        id: resolve_shared_commit
        env:
          PARENT_COMMIT_SHA: ${{ inputs.parent_commit_sha }}
          PARENT_REPO: ${{ inputs.parent_repo }}
          SHARED_REPO: ${{ github.repository }}
          SHARED_PACKAGE_NAME: '@rchapkailo/shared'
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "Missing token to query GitHub API. Configure GH_PACKAGES_TOKEN or use GITHUB_TOKEN permissions."
            exit 1
          fi

          PARENT_PKG_JSON=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/${PARENT_REPO}/contents/package.json?ref=${PARENT_COMMIT_SHA}")

          CANARY_VERSION=$(node -e "const pkg=JSON.parse(process.argv[1]); const name=process.argv[2]; const v=(pkg.dependencies&&pkg.dependencies[name])||(pkg.devDependencies&&pkg.devDependencies[name])||(pkg.peerDependencies&&pkg.peerDependencies[name])||''; process.stdout.write(v);" "$PARENT_PKG_JSON" "$SHARED_PACKAGE_NAME")
          if [[ -z "$CANARY_VERSION" ]]; then
            echo "Could not find dependency $SHARED_PACKAGE_NAME in ${PARENT_REPO}@${PARENT_COMMIT_SHA}."
            exit 1
          fi

          if [[ "$CANARY_VERSION" =~ \.pr([0-9]+)$ ]]; then
            SHARED_PR_NUMBER="${BASH_REMATCH[1]}"
          else
            echo "Dependency version '$CANARY_VERSION' does not look like a canary build with .pr<NUMBER> suffix."
            exit 1
          fi

          SHARED_PR_JSON=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${SHARED_REPO}/pulls/${SHARED_PR_NUMBER}")

          SHARED_COMMIT_SHA=$(node -e "const pr=JSON.parse(process.argv[1]); if(!pr.merged_at||!pr.merge_commit_sha){process.exit(2)}; process.stdout.write(pr.merge_commit_sha);" "$SHARED_PR_JSON")
          if [[ -z "$SHARED_COMMIT_SHA" ]]; then
            echo "Could not resolve merge commit from ${SHARED_REPO} PR #${SHARED_PR_NUMBER}."
            exit 1
          fi

          if ! git rev-parse "$SHARED_COMMIT_SHA^{commit}" >/dev/null 2>&1; then
            echo "Resolved shared commit is not valid in this repository: $SHARED_COMMIT_SHA"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$SHARED_COMMIT_SHA" "origin/main"; then
            echo "Resolved shared commit $SHARED_COMMIT_SHA is not on main history."
            exit 1
          fi

          echo "source_commit_sha=$SHARED_COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "canary_version=$CANARY_VERSION" >> "$GITHUB_OUTPUT"
          echo "shared_pr_number=$SHARED_PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Compute release branch from commits
        id: release_branch
        env:
          SOURCE_COMMIT_SHA: ${{ steps.resolve_shared_commit.outputs.source_commit_sha }}
        run: |
          # semantic-release dry-run verifies remote/branch permissions even in no-publish mode.
          # Use a local bare repo as temporary remote to avoid GitHub token workflow-file push restrictions.
          ANALYSIS_BRANCH="sr-analysis"
          TEMP_GIT_DIR=$(mktemp -d)
          TEMP_REMOTE="$TEMP_GIT_DIR/semantic-release-remote.git"
          cleanup() {
            rm -rf "$TEMP_GIT_DIR"
          }
          trap cleanup EXIT

          git init --bare "$TEMP_REMOTE"
          git push "file://$TEMP_REMOTE" "$SOURCE_COMMIT_SHA":refs/heads/$ANALYSIS_BRANCH
          git --git-dir "$TEMP_REMOTE" symbolic-ref HEAD "refs/heads/$ANALYSIS_BRANCH"
          git checkout -B "$ANALYSIS_BRANCH" "$SOURCE_COMMIT_SHA"

          cat > .releaserc.json <<EOF
          {
            "branches": ["$ANALYSIS_BRANCH"],
            "plugins": ["@semantic-release/commit-analyzer"]
          }
          EOF

          export GITHUB_REF="refs/heads/$ANALYSIS_BRANCH"
          export GITHUB_REF_NAME="$ANALYSIS_BRANCH"
          export GITHUB_HEAD_REF=""
          export GITHUB_BASE_REF=""

          SEMANTIC_RELEASE_OUTPUT=$(npx --yes --package semantic-release --package @semantic-release/commit-analyzer semantic-release --dry-run --no-ci --branches "$ANALYSIS_BRANCH" --repository-url "file://$TEMP_REMOTE" 2>&1 || true)
          printf '%s\n' "$SEMANTIC_RELEASE_OUTPUT"
          COMPUTED_VERSION=$(printf '%s\n' "$SEMANTIC_RELEASE_OUTPUT" | sed -nE 's/.*[Tt]he next release version is ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' | tail -n 1)
          if [[ -z "$COMPUTED_VERSION" ]]; then
            echo "Could not compute a release version from commits up to $SOURCE_COMMIT_SHA"
            exit 1
          fi
          MAJOR=$(echo "$COMPUTED_VERSION" | cut -d. -f1)
          MINOR=$(echo "$COMPUTED_VERSION" | cut -d. -f2)
          PATCH=$(echo "$COMPUTED_VERSION" | cut -d. -f3)
          if [[ "$PATCH" != "0" ]]; then
            echo "Computed version '$COMPUTED_VERSION' is patch-only. Use hotfix workflow for patch releases."
            exit 1
          fi
          RELEASE_BRANCH="release/$MAJOR.$MINOR"
          echo "name=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "version=$COMPUTED_VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next development baseline
        id: next_baseline
        env:
          RELEASE_VERSION: ${{ steps.release_branch.outputs.version }}
        run: |
          NEXT_BASELINE=$(node -e "const [maj,min,pat]=(process.argv[1]||'').split('.').map(Number); if([maj,min,pat].some(Number.isNaN)){process.exit(1)}; process.stdout.write([maj,min,pat+1].join('.'));" "$RELEASE_VERSION")
          echo "version=$NEXT_BASELINE" >> "$GITHUB_OUTPUT"

      - name: Ensure computed release branch does not exist
        env:
          RELEASE_BRANCH: ${{ steps.release_branch.outputs.name }}
        run: |
          if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
            echo "Branch $RELEASE_BRANCH already exists on origin."
            exit 1
          fi

      - name: Create release branch from selected commit
        env:
          RELEASE_BRANCH: ${{ steps.release_branch.outputs.name }}
          SOURCE_COMMIT_SHA: ${{ steps.resolve_shared_commit.outputs.source_commit_sha }}
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "Missing token to create release branch. Configure GH_PACKAGES_TOKEN or use GITHUB_TOKEN permissions."
            exit 1
          fi
          echo "Creating branch $RELEASE_BRANCH at $SOURCE_COMMIT_SHA via GitHub API"
          HTTP_STATUS=$(curl -s -o /tmp/ref-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/refs" \
            -d "{\"ref\":\"refs/heads/${RELEASE_BRANCH}\",\"sha\":\"${SOURCE_COMMIT_SHA}\"}")
          cat /tmp/ref-response.json
          if [[ "$HTTP_STATUS" != "201" ]]; then
            echo "Failed to create branch via API (HTTP $HTTP_STATUS)."
            exit 1
          fi
          echo "Branch $RELEASE_BRANCH created successfully at $SOURCE_COMMIT_SHA"

      - name: Return to main
        run: git checkout -B main origin/main

      - name: Bump package.json for next sprint on main
        run: npm version "${{ steps.next_baseline.outputs.version }}" --no-git-tag-version

      - name: Commit next development baseline
        env:
          NEXT_VERSION: ${{ steps.next_baseline.outputs.version }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add package.json
          git commit -m "chore: start next sprint at v$NEXT_VERSION"

      - name: Open PR for next development baseline
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore: start next sprint at v${{ steps.next_baseline.outputs.version }}"
          branch: chore/next-sprint-v${{ steps.next_baseline.outputs.version }}
          delete-branch: true
          title: "chore: start next sprint at v${{ steps.next_baseline.outputs.version }}"
          body: |
            This PR bumps main to `${{ steps.next_baseline.outputs.version }}` after cutting `${{ steps.release_branch.outputs.name }}` from resolved shared commit `${{ steps.resolve_shared_commit.outputs.source_commit_sha }}` (computed release version `${{ steps.release_branch.outputs.version }}`), derived from parent `${{ inputs.parent_repo }}@${{ inputs.parent_commit_sha }}` canary `${{ steps.resolve_shared_commit.outputs.canary_version }}` (`${{ github.repository }}` PR #${{ steps.resolve_shared_commit.outputs.shared_pr_number }}).
          base: main