name: Hotfix Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or commit that contains the hotfix
        required: true
        type: string
      base_tag:
        description: Stable tag the hotfix was cut from, for example v0.1.0
        required: true
        type: string
      version:
        description: Patch version to publish, for example 0.1.1
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  publish-hotfix:
    runs-on: ubuntu-latest

    steps:
      - name: Check out hotfix ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://npm.pkg.github.com

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.13

      - name: Validate patch line
        env:
          BASE_TAG: ${{ inputs.base_tag }}
          NEW_VERSION: ${{ inputs.version }}
        run: |
          node <<'NODE'
          const tag = process.env.BASE_TAG.replace(/^v/, '');
          const next = process.env.NEW_VERSION;
          const tagParts = tag.split('.').map(Number);
          const nextParts = next.split('.').map(Number);
          if (tagParts.length !== 3 || nextParts.length !== 3 || tagParts.some(Number.isNaN) || nextParts.some(Number.isNaN)) {
            throw new Error('Versions must be full semver values.');
          }
          if (tagParts[0] !== nextParts[0] || tagParts[1] !== nextParts[1] || nextParts[2] <= tagParts[2]) {
            throw new Error(`Hotfix version ${next} must stay on ${tagParts[0]}.${tagParts[1]}.x and bump the patch above ${tag}.`);
          }
          NODE

      - name: Stamp hotfix version
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build package
        run: bun run build

      - name: Create and push release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag v${VERSION}
          git push origin v${VERSION}

      - name: Publish hotfix package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Determine main baseline sync
        id: baseline_sync
        env:
          HOTFIX_VERSION: ${{ inputs.version }}
        run: |
          git fetch origin main
          git checkout -B main origin/main
          MAIN_VERSION=$(node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); if(!pkg.version){process.exit(2)}; process.stdout.write(pkg.version);")
          NEEDS_SYNC=$(node -e "const parse=(s)=>s.split('.').map(Number); const cmp=(a,b)=>{for(let i=0;i<3;i++){if(a[i]!==b[i]) return a[i]-b[i]} return 0}; const main=parse(process.argv[1]); const hotfix=parse(process.argv[2]); if(main.some(Number.isNaN)||hotfix.some(Number.isNaN)){process.exit(1)}; process.stdout.write(cmp(main,hotfix)<=0?'true':'false');" "$MAIN_VERSION" "$HOTFIX_VERSION")
          NEXT_BASELINE=$(node -e "const [maj,min,pat]=(process.argv[1]||'').split('.').map(Number); if([maj,min,pat].some(Number.isNaN)){process.exit(1)}; process.stdout.write([maj,min,pat+1].join('.'));" "$HOTFIX_VERSION")
          echo "main_version=$MAIN_VERSION" >> "$GITHUB_OUTPUT"
          echo "needs_sync=$NEEDS_SYNC" >> "$GITHUB_OUTPUT"
          echo "next_baseline=$NEXT_BASELINE" >> "$GITHUB_OUTPUT"

      - name: Bump main baseline after hotfix
        if: steps.baseline_sync.outputs.needs_sync == 'true'
        run: npm version "${{ steps.baseline_sync.outputs.next_baseline }}" --no-git-tag-version

      - name: Open PR to sync main baseline after hotfix
        if: steps.baseline_sync.outputs.needs_sync == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PR_TOKEN != '' && secrets.GH_PR_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync main baseline after hotfix v${{ inputs.version }}"
          branch: chore/sync-main-after-hotfix-v${{ steps.baseline_sync.outputs.next_baseline }}
          delete-branch: true
          title: "chore: sync main baseline to v${{ steps.baseline_sync.outputs.next_baseline }}"
          body: |
            main baseline was `${{ steps.baseline_sync.outputs.main_version }}` and hotfix `${{ inputs.version }}` was published.
            This PR bumps main baseline to `${{ steps.baseline_sync.outputs.next_baseline }}` so canaries stay ahead of published hotfixes.
          base: main
