name: Canary Release

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read
  packages: write

jobs:
  publish-canary:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://npm.pkg.github.com

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Run tests
        run: bun test

      - name: Stamp canary version
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const baseVersion = pkg.version;
          const now = new Date();
          const pad = (value) => String(value).padStart(2, '0');
          const utcToken = `${pad(now.getUTCMonth() + 1)}-${pad(now.getUTCDate())}-${now.getUTCFullYear()}-${pad(now.getUTCHours())}-${pad(now.getUTCMinutes())}-${pad(now.getUTCSeconds())}Z`;
          // Example: 0.1.0-canary.04-25-2026-13-15-30Z.pr21
          pkg.version = `${baseVersion}-canary.${utcToken}.pr${process.env.PR_NUMBER}`;
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          console.log(`Publishing ${pkg.name}@${pkg.version}`);
          NODE

      - name: Publish canary package
        run: npm publish --tag canary
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
